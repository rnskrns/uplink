<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>링크 하이라이트 - 스트리머 설정</title>
  <script src="https://static.sooplive.com/asset/app/extension-helper/soop-extension-sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f14;
      --surface: #181921;
      --card: #1e2030;
      --border: #2a2d40;
      --accent: #5b6ef5;
      --accent-glow: rgba(91,110,245,0.2);
      --accent-hover: #7b8ef7;
      --danger: #f55b5b;
      --warn: #f5a623;
      --text: #e8e9f0;
      --muted: #7a7d96;
      --label: #a0a3bc;
      --radius: 10px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      font-size: 13px;
      padding: 16px;
      min-height: 100vh;
    }
    header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .logo-dot {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 14px;
      box-shadow: 0 0 12px var(--accent-glow);
    }
    header h1 { font-size: 15px; font-weight: 700; }
    header span {
      font-size: 11px; color: var(--muted); margin-left: auto;
      background: var(--card); padding: 3px 8px;
      border-radius: 20px; border: 1px solid var(--border);
    }
    .add-section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 16px;
    }
    .field-label {
      font-size: 11px; color: var(--label); margin-bottom: 5px;
      font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
      display: block;
    }
    .field { margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"], input[type="datetime-local"] {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 12px;
      padding: 8px 11px; outline: none; transition: border-color 0.15s;
      width: 100%;
    }
    input[type="datetime-local"] { color-scheme: dark; }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input::placeholder { color: var(--muted); }
    .btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 7px; padding: 8px 14px; font-size: 12px;
      font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.97); }
    .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(245,91,91,0.12); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--label); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .section-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .section-title {
      font-size: 12px; color: var(--label); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .badge {
      background: var(--accent); color: #fff; font-size: 10px;
      font-weight: 700; padding: 2px 7px; border-radius: 20px;
    }
    .link-list { display: flex; flex-direction: column; gap: 8px; }
    .link-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 13px;
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.15s;
    }
    .link-item:hover { border-color: rgba(91,110,245,0.5); }
    .link-item.expired { opacity: 0.5; }
    .link-info { flex: 1; min-width: 0; }
    .link-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .link-deadline { font-size: 10px; display: flex; align-items: center; gap: 5px; }
    .d-tag {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-weight: 700; font-size: 10px;
    }
    .d-tag.ok { background: rgba(91,110,245,0.15); color: var(--accent); }
    .d-tag.warn { background: rgba(245,166,35,0.15); color: var(--warn); }
    .d-tag.expired { background: rgba(245,91,91,0.12); color: var(--danger); }
    .link-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; line-height: 1.6; }
    .save-bar { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff; padding: 10px 18px;
      border-radius: 20px; font-size: 12px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow); z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo-dot">🔗</div>
  <h1>링크 하이라이트</h1>
  <span>스트리머 설정</span>
</header>

<div class="add-section">
  <div class="field">
    <label class="field-label">링크 제목</label>
    <input type="text" id="inputName" placeholder="예) 방송국 홍보글 댓글 이벤트" maxlength="30" />
  </div>
  <div class="field">
    <label class="field-label">URL</label>
    <input type="text" id="inputUrl" placeholder="https://" />
  </div>
  <div class="field">
    <label class="field-label">마감 기한</label>
    <div class="input-row">
      <input type="datetime-local" id="inputDeadline" />
      <button class="btn" onclick="addLink()">추가</button>
    </div>
  </div>
</div>

<div class="section-header">
  <span class="section-title">등록된 링크</span>
  <span class="badge" id="countBadge">0</span>
</div>

<div class="link-list" id="linkList"></div>

<div class="save-bar">
  <button class="btn btn-ghost btn-sm" onclick="resetAll()">전체 삭제</button>
  <button class="btn btn-sm" onclick="saveLinks()">저장 · 적용</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let links = [];

  window.addEventListener('load', () => {
    // 기본 마감일: 오늘 자정
    const now = new Date();
    now.setHours(23, 59, 0, 0);
    document.getElementById('inputDeadline').value = toLocalInput(now);

    if (typeof Soop !== 'undefined') {
      Soop.ext.onAuthorized(() => loadLinks());
    } else {
      loadLinks();
    }
  });

  function toLocalInput(date) {
    const pad = n => String(n).padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  function loadLinks() {
    try {
      const saved = localStorage.getItem('soop_hl_links');
      if (saved) links = JSON.parse(saved);
    } catch(e) { links = []; }
    renderList();
  }

  function addLink() {
    const name = document.getElementById('inputName').value.trim();
    const url  = document.getElementById('inputUrl').value.trim();
    const dl   = document.getElementById('inputDeadline').value;

    if (!name) { showToast('링크 제목을 입력해 주세요'); return; }
    if (!url || !url.startsWith('http')) { showToast('올바른 URL을 입력해 주세요'); return; }
    if (!dl) { showToast('마감 기한을 설정해 주세요'); return; }

    links.push({ id: Date.now(), name, url, deadline: new Date(dl).toISOString() });
    document.getElementById('inputName').value = '';
    document.getElementById('inputUrl').value = '';
    renderList();
    showToast('링크가 추가되었습니다');
  }

  function deleteLink(id) {
    links = links.filter(l => l.id !== id);
    renderList();
  }

  function saveLinks() {
    localStorage.setItem('soop_hl_links', JSON.stringify(links));
    if (typeof Soop !== 'undefined') {
      Soop.ext.broadcast(JSON.stringify({ type: 'UPDATE_LINKS', links }));
    }
    showToast('✅ 저장 및 적용 완료');
  }

  function resetAll() {
    if (!confirm('등록된 링크를 모두 삭제할까요?')) return;
    links = [];
    renderList();
  }

  function getDTag(deadline) {
    const now = new Date();
    const dl  = new Date(deadline);
    const diff = Math.ceil((dl - now) / (1000 * 60 * 60 * 24));
    if (diff < 0)  return { label: '마감', cls: 'expired' };
    if (diff === 0) return { label: 'D-Day', cls: 'warn' };
    if (diff <= 3)  return { label: `D-${diff}`, cls: 'warn' };
    return { label: `D-${diff}`, cls: 'ok' };
  }

  function fmtDeadline(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function renderList() {
    const list = document.getElementById('linkList');
    document.getElementById('countBadge').textContent = links.length;

    if (links.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>등록된 링크가 없습니다.<br>위에서 링크를 추가해 주세요.</p></div>`;
      return;
    }

    list.innerHTML = links.map(l => {
      const dtag = getDTag(l.deadline);
      const isExpired = dtag.cls === 'expired';
      return `
      <div class="link-item ${isExpired ? 'expired' : ''}">
        <div class="link-info">
          <div class="link-name">${esc(l.name)}</div>
          <div class="link-url">${esc(l.url)}</div>
          <div class="link-deadline">
            <span class="d-tag ${dtag.cls}">${dtag.label}</span>
            <span style="color:var(--muted)">${fmtDeadline(l.deadline)} 마감</span>
          </div>
        </div>
        <div class="link-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteLink(${l.id})">삭제</button>
        </div>
      </div>`;
    }).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
